<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="animations.css">
</head>
<body>

<h2>Application Form</h2>
<button onclick="logout()" style="float: right; background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4); transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 6px 20px rgba(255, 107, 107, 0.6)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(255, 107, 107, 0.4)'">
    Log Out 🔓
</button>
<form id="appForm">
  <input id="regNo" placeholder="Registration Number" required>
  <input type="hidden" id="docId">
  <input id="name" placeholder="Applicant Name" required>
  <input id="fatherName" placeholder="Father Name">
  <input id="dob" type="date" placeholder="DD-MM-YYYY" onfocus="this.showPicker && this.showPicker()">

  <input id="qualification" placeholder="Qualification">
  <input id="circleDate" type="date" placeholder="DD-MM-YYYY" onfocus="this.showPicker && this.showPicker()">

  <select id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <select id="branch">
    <option value="">Select Branch</option>
  </select>

  <input id="email" type="email" placeholder="Email">
  <input id="district" placeholder="District">
  <input id="phone" placeholder="Phone Number">
  <div style="display:flex; gap:6px;">
  <select id="bridge">
    <option value="">Select Bridge</option>
  </select>
      <button type="button" id="addBridgeBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 3px 10px rgba(16, 185, 129, 0.3);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(16, 185, 129, 0.5)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 3px 10px rgba(16, 185, 129, 0.3)'">➕ Add Bridge</button>
  </div>

  <select id="status">
    <option value="">Select Status</option>
    <option>Follow Up</option>
    <option>Confirmation</option>
    <option>Verification</option>
    <option>Refollow Up</option>
    <option>Cancel</option>
  </select>

  <button type="submit">Save Application</button>
</form>

<h3>Filters</h3>
<div class="filters">
  <select id="filterBranch">
    <option value="">All Branches</option>
  </select>

  <select id="filterStatus">
    <option value="">All Status</option>
    <option>Follow Up</option>
    <option>Confirmation</option>
    <option>Verification</option>
    <option>Refollow Up</option>
    <option>Cancel</option>
  </select>

  <select id="filterBridge">
    <option value="">All Bridges</option>
  </select>

  <input type="date" id="filterDate">
  <input type="month" id="filterMonth">
  <button type="button" id="clearFilters">Clear</button>
</div>
<button id="printFiltered" class="print-btn">🖨 Print Filtered Data</button>
<div style="margin:10px 0">
  <button id="openBinBtn" class="print-btn">🗑 Open Bin</button>
</div>

<div class="table-wrapper">
<table>
  <thead>
    <tr>
      <th>RegNo</th><th>Name</th><th>Father</th><th>DOB</th>
      <th>Qual</th><th>Circle</th><th>Gender</th><th>Branch</th>
      <th>Email</th><th>District</th><th>Phone</th><th>Bridge</th>
      <th>Status</th><th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
<script src="app.js"></script>
</body>
</html>
