<!DOCTYPE html>
<html>
<head>
    <title>V Believers - Auth</title>
    <style>
        /* ===== ANIMATED GRADIENT BACKGROUND ===== */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== FLOATING PARTICLES EFFECT ===== */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="2" fill="white" opacity="0.2"/></svg>');
            animation: float 20s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-100px); }
        }

        /* ===== GLASSMORPHISM AUTH BOX ===== */
        .box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            width: 380px;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== TITLE WITH ANIMATION ===== */
        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== INPUT FIELDS WITH FOCUS EFFECT ===== */
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            box-sizing: border-box;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2), 0 4px 12px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* ===== BUTTON WITH RIPPLE EFFECT ===== */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* ===== LINKS CONTAINER ===== */
        .links-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .toggle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            text-decoration: underline;
            transition: all 0.3s ease;
        }

        .toggle:hover {
            color: #ffffff;
            transform: scale(1.05);
        }

        #backLink {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #backLink:hover {
            color: #ffffff;
            transform: translateX(-5px);
        }

        /* ===== RECOVERY INPUT SPECIAL STYLING ===== */
        #recovery {
            border: 2px solid rgba(255, 107, 107, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 107, 107, 0);
            }
        }

        /* ===== MODE TRANSITION ANIMATION ===== */
        .box.changing {
            animation: flipTransition 0.6s ease-out;
        }

        @keyframes flipTransition {
            0% {
                transform: scale(1) rotateY(0);
            }
            50% {
                transform: scale(0.95) rotateY(90deg);
            }
            100% {
                transform: scale(1) rotateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="box" id="authBox">
        <h2 id="title">HR Login</h2>
        
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        
        <input type="password" id="recovery" placeholder="Enter Master Recovery Key" style="display:none;">
        
        <button id="mainBtn" onclick="handleAuth()">Login</button>

        <div class="links-container" id="normalLinks">
            <span class="toggle" onclick="setMode('register')">New? Create Account</span>
            <span class="toggle" onclick="setMode('forgot')" style="border: 1px solid rgba(255, 255, 255, 0.5); padding: 4px 10px; border-radius: 6px; text-decoration: none;">Help! Forgot Password</span>
        </div>
        
        <div id="backLink" onclick="setMode('login')">← Back to Login</div>
    </div>

    <script>
    const API_URL = "/api";
    let mode = 'login';

    function setMode(newMode) {
        mode = newMode;
        const title = document.getElementById("title");
        const btn = document.getElementById("mainBtn");
        const recoveryInput = document.getElementById("recovery");
        const passInput = document.getElementById("pass");
        const normalLinks = document.getElementById("normalLinks");
        const backLink = document.getElementById("backLink");
        const authBox = document.getElementById("authBox");

        // Add flip animation
        authBox.classList.add('changing');
        setTimeout(() => authBox.classList.remove('changing'), 600);

        // Reset UI
        recoveryInput.style.display = "none";
        passInput.style.display = "block";
        normalLinks.style.display = "flex";
        backLink.style.display = "none";
        passInput.placeholder = "Password";

        if (mode === 'register') {
            title.innerText = "New Account";
            btn.innerText = "Create Account";
        } else if (mode === 'forgot') {
            title.innerText = "Reset Password";
            btn.innerText = "Update Password";
            passInput.placeholder = "Enter New Password";
            recoveryInput.style.display = "block";
            normalLinks.style.display = "none";
            backLink.style.display = "block";
        } else {
            title.innerText = "HR Login";
            btn.innerText = "Login";
        }
    }

    async function handleAuth() {
        const username = document.getElementById("user").value;
        const password = document.getElementById("pass").value;
        const recoveryKey = document.getElementById("recovery").value;

        if (!username || !password) {
            alert("Please fill in all fields");
            return;
        }

        let endpoint = `${API_URL}/auth/login`;
        let payload = { username, password };

        if (mode === 'register') {
            endpoint = `${API_URL}/auth/register`;
        } else if (mode === 'forgot') {
            if (!recoveryKey) { alert("Master Key is required!"); return; }
            endpoint = `${API_URL}/auth/reset-password`;
            payload = { username, recoveryKey, newPassword: password };
        }

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                if (mode === 'login') {
                    localStorage.setItem("isLoggedIn", "true");
                    window.location.href = "index.html";
                } else {
                    alert(result.message || "Success!");
                    setMode('login');
                }
            } else {
                alert(result.error || "Action failed. Check credentials.");
            }
        } catch (err) {
            console.error(err);
            alert("Connection Error. Please check your Netlify Function logs.");
        }
    }
</script>
</body>
</html>
